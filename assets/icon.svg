<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Nethax — JAX NetHack">
  <!--
    Nethax icon
    A NetHack dungeon room (cyan walls), the @ adventurer at its centre
    in classic NetHack green, surrounded by four glyphs in the canonical
    NetHack palette: $ (gold), ! (potion-magenta), D (dragon-red), * (gem-cyan).
    The outer rounded square evokes a JAX/XLA "compiled tile".

    Palette taken from vendor/nethack/win/tty/term_termcap.c colour table.
  -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0e1320"/>
      <stop offset="1"   stop-color="#040611"/>
    </linearGradient>
    <linearGradient id="atGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#80ffae"/>
      <stop offset="1"   stop-color="#1ec96a"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#27c4d6"/>
      <stop offset="1"   stop-color="#138a99"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0"   stop-color="#1ec96a" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#1ec96a" stop-opacity="0.08"/>
      <stop offset="1"   stop-color="#1ec96a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feMerge>
        <feMergeNode in="off"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded "compiled tile" frame -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bgGrad)"/>
  <rect x="2" y="2" width="252" height="252" rx="46" ry="46"
        fill="none" stroke="#1a2235" stroke-width="2"/>

  <!-- Faint 8x8 grid (dungeon floor tiles) -->
  <g stroke="#1a2235" stroke-width="0.6" opacity="0.55">
    <path d="M32 32 V224 M64 32 V224 M96 32 V224 M128 32 V224 M160 32 V224 M192 32 V224 M224 32 V224"/>
    <path d="M32 32 H224 M32 64 H224 M32 96 H224 M32 128 H224 M32 160 H224 M32 192 H224 M32 224 H224"/>
  </g>

  <!-- Centre glow (player radiance) -->
  <circle cx="128" cy="128" r="74" fill="url(#centerGlow)"/>

  <!-- Inner room: cyan dungeon walls (top/bottom = -, sides = |) -->
  <g fill="url(#wallGrad)" filter="url(#softShadow)">
    <!-- top wall row -->
    <rect x="48"  y="48"  width="160" height="10" rx="2"/>
    <!-- bottom wall row -->
    <rect x="48"  y="198" width="160" height="10" rx="2"/>
    <!-- left wall column -->
    <rect x="48"  y="48"  width="10"  height="160" rx="2"/>
    <!-- right wall column -->
    <rect x="198" y="48"  width="10"  height="160" rx="2"/>
  </g>

  <!-- Corner-glyphs: $ ! D * — classic NetHack palette -->
  <g font-family="'IBM Plex Mono','SF Mono','JetBrains Mono','Menlo','Consolas',monospace"
     font-weight="700" text-anchor="middle" dominant-baseline="central">
    <!-- $ gold (NetHack yellow-bright) -->
    <text x="76"  y="80"  font-size="22" fill="#ffd02a">$</text>
    <!-- ! potion (NetHack magenta) -->
    <text x="180" y="80"  font-size="22" fill="#c855ff">!</text>
    <!-- D dragon (NetHack red) -->
    <text x="76"  y="180" font-size="22" fill="#ff5959">D</text>
    <!-- * gem (NetHack cyan-bright) -->
    <text x="180" y="180" font-size="22" fill="#69e8ff">*</text>
  </g>

  <!-- Centre: the @ adventurer -->
  <g font-family="'IBM Plex Mono','SF Mono','JetBrains Mono','Menlo','Consolas',monospace"
     font-weight="800" text-anchor="middle" dominant-baseline="central">
    <text x="128" y="132" font-size="118" fill="url(#atGrad)"
          filter="url(#softShadow)">@</text>
  </g>

  <!-- JAX/XLA hint: four small λ marks suggesting vmap'd batched envs -->
  <g font-family="'IBM Plex Mono','SF Mono','JetBrains Mono','Menlo','Consolas',monospace"
     font-weight="600" text-anchor="middle" dominant-baseline="central"
     fill="#5b6b8a" opacity="0.55">
    <text x="22"  y="22"  font-size="14">λ</text>
    <text x="234" y="22"  font-size="14">λ</text>
    <text x="22"  y="238" font-size="14">λ</text>
    <text x="234" y="238" font-size="14">λ</text>
  </g>
</svg>
